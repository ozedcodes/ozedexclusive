<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#e9dfcf"/>
      <stop offset="100%" stop-color="#d3c3ab"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="t" />
      <feColorMatrix type="saturate" values="0" />
      <feBlend in="SourceGraphic" in2="t" mode="overlay" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#g)" />
  <g transform="translate(120,80)">
    <rect x="0" y="220" width="1200" height="420" rx="40" fill="#c7a885" opacity="0.18"/>
    <rect x="40" y="260" width="1120" height="360" rx="30" fill="#fff" opacity="0.06" />
    <g transform="translate(80,300)">
      <rect x="0" y="0" width="420" height="260" rx="18" fill="#bfa68d" />
      <rect x="460" y="0" width="520" height="260" rx="18" fill="#9f8a74" />
      <rect x="1000" y="30" width="120" height="200" rx="14" fill="#d3c7b3" opacity="0.9" />
    </g>
  </g>
  <text x="130" y="110" font-family="Playfair Display, serif" font-size="48" fill="#274d4d">Ozed Exclusive</text>
  <text x="130" y="150" font-family="Inter, sans-serif" font-size="18" fill="#44655f">Clean installation · Perfect finish</text>
</svg>